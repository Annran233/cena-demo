/* data/config.js — 配置常量
   依赖：core/geo.js (wgs84ToGcj02，在 app.js 中转换)
   复赛迁移：infra/config.ts（环境变量注入）

   === API 调用模式（初赛→复赛迁移路径）===
   AMAP_API_MODE = 'direct'  初赛：浏览器直连高德 REST API，Key 由 build.js 构建时注入
   AMAP_API_MODE = 'proxy'   复赛：通过 Cloudflare Pages Function 代理，Key 在服务端，前端零暴露
   切换步骤：部署 Pages Function → 改 AMAP_API_MODE 为 'proxy' → 重新构建
   当前部署：Cloudflare Pages（cena-demo.pages.dev / cenad.meowoflow.top）
*/

// API 调用模式（初赛 direct → 复赛 proxy）
const AMAP_API_MODE = 'proxy';

// 高德 API Key
// direct 模式：构建时由 build.js 从环境变量注入到 '__AMAP_KEY__' 占位符
// proxy  模式：前端零 Key 暴露，Key 在 Pages Function 服务端 env.AMAP_KEY 注入
// 切回 direct 时改为 '__AMAP_KEY__' 由 build.js 注入
const AMAP_KEY = '';

// API 基地址
// direct 模式：高德 REST API 直连
// proxy 模式：同源 Pages Function 代理（/api/amap/* → 服务端注入 Key）
const AMAP_API_BASE = AMAP_API_MODE === 'direct'
  ? 'https://restapi.amap.com/v3'
  : '/api/amap';

/* 统一 API URL 构造器（所有高德 API 调用的唯一入口）
   direct 模式：拼接 key 参数到 URL（浏览器直连高德，JSONP）
   proxy  模式：不带 key（Pages Function 服务端注入），前端零 Key 暴露
   amapJsonp() 内部根据 AMAP_API_MODE 自适应：
     - direct → JSONP（高德 callback 参数）
     - proxy  → fetch（Pages Function 返回 JSON） */
function amapApiUrl(path, params) {
  const sp = new URLSearchParams(params);
  if (AMAP_API_MODE === 'direct') {
    sp.set('key', AMAP_KEY);
  }
  return AMAP_API_BASE + path + '?' + sp.toString();
}

function renderStars(rating) {
  const full = Math.round(rating);
  let html = '<span class="stars">';
  for (let i = 1; i <= 5; i++) html += i <= full ? '★' : '<span class="empty">★</span>';
  html += '</span>';
  return html;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('is-show');
  setTimeout(() => el.classList.remove('is-show'), 1800);
}

function debounce(fn, wait) {
  let t;
  return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), wait); };
}

/* ui/map.js — 地图渲染逻辑（变量声明 + 函数定义，初始化在 app.js）
   依赖：core/geo.js, core/status.js, data/toilets.js, ui/panel.js (openPanel)
   复赛迁移：web/src/components/Map.ts
*/

let map, markers = [], currentFilter = 'all', liveToilets = [], liveToiletIdCounter = 0;
let clusterGroup = null; // 聚合图层（低缩放级别时使用）
let pickPinMarker = null; // 上报拾取图钉（可拖动）
let pickMapClickHandler = null; // 拾取模式下地图点击 handler
let selectedToiletId = null; // 当前选中厕所 ID（renderMarkers 后自动恢复高亮）

function getAllToilets() {
  // 合并顺序：userToilets（持久化，最高优先级）→ liveToilets（实时搜索）→ MOCK_TOILETS
  // 去重规则：userToilets 中的 promoted 点位有 originalId 字段，
  //   对应 MOCK/live 中同 id 的原始点位应被过滤（避免重复 marker / 旧状态覆盖）
  //   同时保留 name 去重兜底（处理同名但无 originalId 的情况）
  // 距离过滤：三类点位统一以 searchCenter 为中心 3km 半径，避免跨城市显示

  // 1. userToilets：过滤 archived（90天无确认归档）+ 3km 距离范围
  const visibleUser = userToilets.filter(t => {
    if (pointTier(t) === 'archived') return false;
    const d = haversine(searchCenter[0], searchCenter[1], t.lat, t.lng);
    return d <= 3000;
  });

  // 2. 从附近用户点位和 liveToilets 收集已出现的 id/name（用于去重，避免重复 marker）
  const userOriginalIds = new Set();
  const userNames = new Set();
  for (const ut of visibleUser) {
    if (ut.originalId) userOriginalIds.add(ut.originalId);
    userNames.add(ut.name);
  }
  const liveIds = new Set();
  const liveNames = new Set();
  for (const lt of liveToilets) {
    liveIds.add(lt.id);
    liveNames.add(lt.name);
  }

  // 3. liveToilets：去重 + 3km 安全距离过滤（本地筛选已限 3km，加边界兜底）
  const liveWithSupplements = liveToilets
    .filter(t => {
      if (userOriginalIds.has(t.id) || userNames.has(t.name)) return false;
      const d = haversine(searchCenter[0], searchCenter[1], t.lat, t.lng);
      return d <= 3000;
    })
    .map(t => { const copy = { ...t }; applySupplementToToilet(copy); applyDescSupplementToToilet(copy); return copy; });

  // 4. MOCK_TOILETS：3km 距离 + 去重（排除 userToilets 和 liveToilets 中已有的），应用补充标签
  const nearbyMock = MOCK_TOILETS.filter(t => {
    const d = haversine(searchCenter[0], searchCenter[1], t.lat, t.lng);
    return d <= 3000
      && !userOriginalIds.has(t.id) && !userNames.has(t.name)
      && !liveIds.has(t.id) && !liveNames.has(t.name);
  }).map(t => {
    const copy = { ...t };
    applySupplementToToilet(copy);
    applyDescSupplementToToilet(copy);
    return copy;
  });

  return [...visibleUser, ...liveWithSupplements, ...nearbyMock];
}

/* 清除所有 marker（含聚合层） */
function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (clusterGroup) clusterGroup.clearLayers();
}

/* 高亮选中厕所的 marker：放大 + 白色脉冲光环，在密集 POI 中一眼可辨 */
function highlightMarker(toiletId) {
  selectedToiletId = toiletId;
  applyHighlight();
}

/* 内部：将 is-selected class 应用到对应 marker DOM */
function applyHighlight() {
  // 先清除旧高亮
  document.querySelectorAll('.toilet-marker.is-selected').forEach(el => {
    el.classList.remove('is-selected');
    const parent = el.closest('.leaflet-marker-icon');
    if (parent) parent.style.zIndex = '';
  });
  if (!selectedToiletId) return;
  // 遍历直显 marker（聚合态下 marker DOM 不存在，高亮无意义）
  const target = markers.find(m => m._toiletId === selectedToiletId);
  if (!target) return;
  const el = target.getElement();
  if (!el) return;
  const dot = el.querySelector('.toilet-marker');
  if (!dot) return;
  dot.classList.add('is-selected');
  // 提升 marker 层级，确保光环不被相邻 marker 遮挡
  el.style.zIndex = 1000;
}

/* 清除选中高亮 */
function clearMarkerHighlight() {
  selectedToiletId = null;
  applyHighlight();
}

/* 聚合图标：MD3 Badge 风格，根据聚合内点位主状态决定颜色，数量级决定尺寸 */
function createClusterIcon(cluster) {
  const children = cluster.getAllChildMarkers();
  const count = children.length;
  let greenCount = 0, redCount = 0, uncertainCount = 0, grayCount = 0;
  children.forEach(m => {
    const html = m.options.icon && m.options.icon.options && m.options.icon.options.html;
    if (html && html.includes('green')) greenCount++;
    else if (html && html.includes('red')) redCount++;
    else if (html && html.includes('uncertain')) uncertainCount++;
    else grayCount++;
  });
  let cls = 'green';
  const max = Math.max(greenCount, redCount, uncertainCount, grayCount);
  if (max === greenCount) cls = 'green';
  else if (max === redCount) cls = 'red';
  else if (max === uncertainCount) cls = 'uncertain';
  else cls = 'gray';

  let size;
  if (count < 10) size = 36;
  else if (count < 50) size = 40;
  else if (count < 100) size = 44;
  else size = 48;
  const half = size / 2;
  const label = count > 99 ? '99+' : count;
  const fontSize = count < 10 ? 14 : count < 50 ? 13 : count < 100 ? 12 : 11;

  return L.divIcon({
    className: 'toilet-cluster-icon',
    html: '<div class="toilet-cluster ' + cls + '" style="width:' + size + 'px;height:' + size + 'px;font-size:' + fontSize + 'px;line-height:' + size + 'px;">' + label + '</div>',
    iconSize: [size, size],
    iconAnchor: [half, half]
  });
}

function toiletPassesFilter(t) {
  switch (currentFilter) {
    case 'accessible': return t.accessible;
    case 'family': return t.family;
    case 'water': return t.water;
    case 'open': return t.status === 'open';
    default: return true;
  }
}

/* 渲染 marker：zoom<14 聚合，zoom≥14 直显；无 emoji，响应式 icon 尺寸 */
function renderMarkers() {
  clearMarkers();
  const useCluster = map.getZoom() < 14; // 低缩放级别启用聚合
  // 响应式 icon：移动端 28px 正圆居中锚点，桌面端 30px 水滴底部锚点
  const isMobile = window.innerWidth < 768;
  const iconSize = isMobile ? [28, 28] : [30, 30];
  const iconAnchor = isMobile ? [14, 14] : [15, 30];

  getAllToilets().filter(toiletPassesFilter).forEach(t => {
    const cls = markerClass(t);
    const icon = L.divIcon({
      className: '',
      html: '<div class="toilet-marker ' + cls + '"></div>',
      iconSize: iconSize,
      iconAnchor: iconAnchor,
      popupAnchor: [0, -iconAnchor[1]]
    });
    const m = L.marker([t.lat, t.lng], { icon });
    m._toiletId = t.id;  // 保存 toiletId 用于选中高亮查找
    m.on('click', () => {
      openPanel(t);
      collapseNearbyList(); // 移动端：点击 marker 收起列表，不遮挡地图
    });
    // 聚合模式下，选中的 marker 单独直显（不被收进 cluster），保持高亮可见
    if (useCluster && t.id !== selectedToiletId) {
      clusterGroup.addLayer(m);
    } else {
      m.addTo(map);
      markers.push(m);
    }
  });
  // marker 重建后恢复选中态（setView/zoomend 触发的重渲染不丢失高亮）
  applyHighlight();
}

/* ============ 上报拾取模式 ============ */
/* 进入拾取模式：放置可拖动图钉，点击地图移动图钉，坐标实时回调 */
function startPickMode(coords, onMove) {
  clearPickMode();
  // 复用 search-pin 样式，标签改为"上报位置"，emoji 用📍
  const pickIcon = L.divIcon({
    className: 'search-pin-marker',
    html: '<div class="search-pin"><div class="search-pin__head"><span class="emoji">📍</span></div><div class="search-pin__label">上报位置</div></div>',
    iconSize: [80, 65],
    iconAnchor: [40, 36]
  });
  pickPinMarker = L.marker(coords, { icon: pickIcon, draggable: true, zIndexOffset: 1000 }).addTo(map);
  // 拖动图钉 → 坐标实时更新
  pickPinMarker.on('drag', () => {
    const pos = pickPinMarker.getLatLng();
    onMove([pos.lat, pos.lng]);
  });
  // 点击地图 → 图钉移动到点击位置
  pickMapClickHandler = (e) => {
    pickPinMarker.setLatLng(e.latlng);
    onMove([e.latlng.lat, e.latlng.lng]);
  };
  map.on('click', pickMapClickHandler);
}

/* 退出拾取模式：移除图钉和地图点击监听 */
function clearPickMode() {
  if (pickMapClickHandler) {
    map.off('click', pickMapClickHandler);
    pickMapClickHandler = null;
  }
  if (pickPinMarker) {
    map.removeLayer(pickPinMarker);
    pickPinMarker = null;
  }
}

/* 获取当前拾取坐标 */
function getPickCoords() {
  if (!pickPinMarker) return null;
  const pos = pickPinMarker.getLatLng();
  return [pos.lat, pos.lng];
}

/* ============ 轨道交通图层 ============ */
let metroLayerGroup = null; // 图层组：线路 polyline（底）+ 站点圆点（顶）

/* 渲染轨道交通图层（线路 polyline + 站点圆点，polyline 不拦截交互） */
function renderMetroLayer() {
  if (metroLayerGroup) map.removeLayer(metroLayerGroup);
  metroLayerGroup = L.layerGroup();

  Object.keys(METRO_LINES).forEach(lineKey => {
    const line = METRO_LINES[lineKey];
    const latlngs = line.stations.map(s => [s.lat, s.lng]);
    // 绘制线路 polyline：interactive:false 不拦截点击，不影响地图拖拽和站点点击
    if (latlngs.length >= 2) {
      L.polyline(latlngs, {
        color: line.color,
        weight: 4,
        opacity: 0.75,
        lineCap: 'round',
        lineJoin: 'round',
        interactive: false
      }).addTo(metroLayerGroup);
    }
    // 站点圆点在 polyline 上方绘制（zIndexOffset 高于 polyline）
    line.stations.forEach(s => {
      const color = METRO_COLORS[s.type] || '#999';
      const circle = L.circleMarker([s.lat, s.lng], {
        radius: 7,
        fillColor: color,
        color: '#ffffff',
        weight: 2.5,
        opacity: 1,
        fillOpacity: 0.95,
        zIndexOffset: 500
      });
      circle.bindTooltip(s.name + ' · ' + line.name, {
        direction: 'top',
        offset: [0, -10],
        opacity: 0.92
      });
      circle.on('click', (e) => {
        L.DomEvent.stopPropagation(e);
        openMetroPanel(s, line);
      });
      circle.addTo(metroLayerGroup);
    });
  });

  metroLayerGroup.addTo(map);
}

/* 清除轨道交通图层 */
function clearMetroLayer() {
  if (metroLayerGroup) {
    map.removeLayer(metroLayerGroup);
    metroLayerGroup = null;
  }
}

let currentToilet = null;

/* 渲染补充设施按钮：3态（未标注/待复核/已确认）
   判断逻辑：先看 t.id 是否以 user_ 开头（持久化对象），直接读 t[tag]
   否则（MOCK/live 拷贝），看 getSupplementStatus() 返回的补充状态 */
function renderSupplementBtn(t, tag, emoji, label) {
  // 持久化对象（userToilets 里的）：标签直接来自对象属性
  if (t.id && t.id.startsWith('user_')) {
    if (t[tag]) {
      return `<div class="report-btn supplement-btn is-confirmed" data-supplement="${tag}" data-action="revoke"><span class="emoji">${emoji}</span>${label} ✓</div>`;
    }
    return `<div class="report-btn supplement-btn" data-supplement="${tag}" data-action="add"><span class="emoji">${emoji}</span>${label}</div>`;
  }
  // 非持久化对象（MOCK 拷贝 / live 拷贝）：看补充标签状态
  const status = getSupplementStatus(t, tag);
  if (status === 'confirmed') {
    return `<div class="report-btn supplement-btn is-confirmed" data-supplement="${tag}" data-action="revoke"><span class="emoji">${emoji}</span>${label} ✓✓</div>`;
  }
  if (status === 'pending') {
    return `<div class="report-btn supplement-btn is-pending" data-supplement="${tag}" data-action="revoke"><span class="emoji">${emoji}</span>${label} ✓</div>`;
  }
  return `<div class="report-btn supplement-btn" data-supplement="${tag}" data-action="add"><span class="emoji">${emoji}</span>${label}</div>`;
}

function openPanel(t) {
  currentToilet = t;
  highlightMarker(t.id); // 高亮选中态 marker

  // 面板打开时隐藏周边列表（避免两个 Bottom Sheet 重叠）
  collapseNearbyList();
  document.getElementById('nearbyList').style.display = 'none';
  const st = statusMeta(t);
  const src = SOURCE_MAP[t.source] || { label: t.source, cls: 'source-amap' };
  const old = isOld(t);
  const d = daysSince(t.last_update);

  const labels = [];
  if (t.accessible) labels.push('<span class="tag label">♿ 无障碍</span>');
  if (t.family) labels.push('<span class="tag label">👨‍👩‍👧 第三卫生间</span>');
  if (t.water) labels.push('<span class="tag label">🚐 房车水源</span>');

  const commentsHtml = t.comments.map(c => `
    <div class="comment-item">
      <div class="head"><span>${c.user}</span><span>${c.time}</span></div>
      ${renderStars(c.rating)}
      <div class="text">${c.text}</div>
    </div>
  `).join('');

  const statusSub = st.sub ? `<span class="tag status-sub">${st.sub}</span>` : '';
  const isRemoved = t.status === 'removed';
  const reportTitle = isRemoved ? '纠错上报（被误报？点这里恢复）' : '一键上报状态（情报反哺）';
  const openBtnLabel = isRemoved ? '仍在开放' : '开放中';

  // 地址行内容：address 与 desc 并列显示，多个 desc 之间用 "·" 分割
  // 取值：address（高德返回）+ t.desc（原始上报描述）+ 所有已验证（confirmed）的补充描述
  // 未确认（pending）的补充描述不进入地址行，仅在补充区域卡片中展示
  const addrParts = [];
  if (t.address) addrParts.push(t.address);
  if (t.desc) addrParts.push(t.desc);
  // 追加所有已验证的补充描述（排除已写入 t.desc 的那条，避免重复）
  const confirmedDescs = getDescSupplementList(t)
    .filter(d => d.status === 'confirmed' && d.text !== t.desc)
    .map(d => d.text);
  addrParts.push(...confirmedDescs);
  const addrLine = addrParts.join(' · ');
  const addrHtml = addrLine ? `<div class="panel__addr">${addrLine}</div>` : '';

  // 位置描述补充区域：多描述独立确认机制
  // hasOriginal：t.desc 来自上报/高德（非 supplement 合并），显示为"原始位置描述"
  // supplementList：descSupplements 中的描述列表，按 count 降序
  // 状态A 有原始 desc：显示原始卡片 + 补充列表（若有）+ "我有补充"按钮
  // 状态B 无 desc 无补充：显示输入框
  // 状态C 有补充列表：显示卡片列表 + "我有补充"按钮
  const hasOriginal = !!(t.desc && !t._descSupplementStatus);
  const supplementList = getDescSupplementList(t);
  const hasSupplements = supplementList.length > 0;
  const showInputDirectly = !hasOriginal && !hasSupplements;  // 状态B

  // 渲染单条描述卡片
  function renderDescCard(item, isOriginal) {
    if (isOriginal) {
      // 原始描述卡片：只读 + "📍 原始位置描述"标注
      return `
        <div class="desc-card desc-card--original">
          <div class="desc-card__text">${item.text}</div>
          <div class="desc-card__hint"><span class="tag desc-tag-original">📍 原始位置描述</span></div>
        </div>`;
    }
    // 补充描述卡片：文本 + 状态标签 + 👍准确 + 撤销（仅 pending&count=1）
    const statusTag = item.status === 'confirmed'
      ? '<span class="tag is-confirmed">🟢 已确认</span>'
      : '<span class="tag is-pending">🟡 待确认</span>';
    // 撤销按钮仅当 pending 且 count=1（当前用户刚补充的）
    const canUndo = item.status === 'pending' && item.count === 1;
    const undoBtn = canUndo
      ? `<button class="desc-action-btn desc-undo-btn" data-desc-undo="${item.text}" type="button">撤销</button>`
      : '';
    return `
      <div class="desc-card">
        <div class="desc-card__header">
          <div class="desc-card__text">${item.text}</div>
          <div class="desc-card__status">${statusTag}</div>
        </div>
        <div class="desc-card__actions">
          <button class="desc-action-btn desc-confirm-btn" data-desc-confirm="${item.text}" type="button">👍 描述准确</button>
          ${undoBtn}
        </div>
      </div>`;
  }

  // 组装区域 HTML
  let descCardsHtml = '';
  // 原始描述卡片
  if (hasOriginal) {
    descCardsHtml += renderDescCard({ text: t.desc }, true);
  }
  // 补充描述卡片列表
  for (const item of supplementList) {
    descCardsHtml += renderDescCard(item, false);
  }

  // 底部输入区：状态B 直接显示输入框，否则显示"我有补充"按钮（点击展开）
  let descInputHtml = '';
  if (showInputDirectly) {
    descInputHtml = `
      <div class="desc-supplement-input-row" id="descInputRow">
        <input id="descSupplementInput" class="desc-input" type="text" placeholder="如：B口出来右转50米、农贸市场二楼东侧" maxlength="50" />
        <button id="descSupplementBtn" class="report-btn" type="button">补充</button>
      </div>`;
  } else {
    // 有原始/补充描述时显示"我有补充"按钮，点击展开输入框
    descInputHtml = `
      <button id="descAddToggleBtn" class="desc-add-toggle-btn" type="button">✏️ 我有补充</button>
      <div class="desc-supplement-input-row desc-input-hidden" id="descInputRow">
        <input id="descSupplementInput" class="desc-input" type="text" placeholder="如：B口出来右转50米、农贸市场二楼东侧" maxlength="50" />
        <button id="descSupplementBtn" class="report-btn" type="button">补充</button>
      </div>`;
  }

  const descSupplementHtml = `
    <div class="report-section desc-supplement-section">
      <h3>补充位置描述（帮后来人找到它）</h3>
      ${descCardsHtml}
      ${descInputHtml}
    </div>`;

  body.innerHTML = `
    <div class="panel__title-row">
      <h2 class="panel__title">${t.name}</h2>
      <button id="navBtn" class="nav-btn" type="button" aria-label="导航前往" title="导航前往"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M21.71 11.29l-9-9a1 1 0 00-1.42 0l-9 9a1 1 0 000 1.42l9 9a1 1 0 001.42 0l9-9a1 1 0 000-1.42zM14 14.5V12h-4v3H8v-4a1 1 0 011-1h5V7.5l3.5 3.5z"/></svg></button>
    </div>
    ${addrHtml}
    <div class="meta">
      <span class="tag ${st.cls}">${st.emoji} ${st.label}</span>
      ${statusSub}
      <span class="tag ${src.cls}">${src.label}</span>
      ${old ? '<span class="tag old-warn">⚠️ 信息较旧</span>' : ''}
      ${labels.join('')}
    </div>
    <div class="info-row"><span class="k">评分</span><span class="v">${renderStars(t.rating)} ${t.rating.toFixed(1)}</span></div>
    <div class="info-row"><span class="k">可信度</span><span class="v">${Math.round(computeConfidence(t) * 100)}% <span style="font-size:11px;color:var(--text-sub);font-weight:400;">（来源${SOURCE_BASE[t.source]||0.5} + 确认${Math.min(0.3,((t.confirm_count||0)+(t.recovery_count||0))*0.1)} - 衰减${freshnessDecay(t.last_update)} + 评论${Math.min(0.1,(t.comments||[]).length*0.03)}）</span></span></div>
    <div class="info-row"><span class="k">最后更新</span><span class="v">${d === 0 ? '今天' : d + ' 天前'}</span></div>

    <div class="report-section">
      <h3>${reportTitle}</h3>
      <div class="report-btns">
        <div class="report-btn" data-report="open"><span class="emoji">🟢</span>${openBtnLabel}</div>
        <div class="report-btn" data-report="locked"><span class="emoji">🔴</span>已锁门</div>
        <div class="report-btn" data-report="repair"><span class="emoji">🟠</span>维修中</div>
        <div class="report-btn" data-report="removed"><span class="emoji">⚫</span>不存在</div>
      </div>
    </div>

    <div class="report-section">
      <h3>补充设施信息（确认有这些设施？点一下帮别人找）</h3>
      <div class="report-btns supplement-btns">
        ${renderSupplementBtn(t, 'accessible', '♿', '无障碍')}
        ${renderSupplementBtn(t, 'family', '👨‍👩‍👧', '第三卫生间')}
        ${renderSupplementBtn(t, 'water', '🚐', '房车水源')}
      </div>
    </div>

    ${descSupplementHtml}

    <div class="comments-section">
      <h3>评论评价（${t.comments.length}）</h3>
      <div class="comment-input">
        <select id="cRating"><option value="5">★★★★★</option><option value="4">★★★★</option><option value="3">★★★</option><option value="2">★★</option><option value="1">★</option></select>
        <input id="cText" type="text" placeholder="说点啥（如：B口出来右转就到）" />
        <button id="cSubmit">发布</button>
      </div>
      ${commentsHtml || '<div style="color:var(--text-sub);font-size:13px;">还没有评论，做第一个调查兵团成员</div>'}
    </div>
  `;

  body.querySelectorAll('.report-btn[data-report]').forEach(btn => {
    btn.addEventListener('click', () => {
      const newStatus = btn.dataset.report;
      // 统一持久化：任何点位（Mock/live/user）修改前先 ensurePersisted
      // 返回的是 userToilets 里的持久化对象引用，后续修改直接生效
      const p = ensurePersisted(t);
      const isRemoved = p.status === 'removed';

      if (newStatus === 'removed') {
        // 拆除报告：首次报告重置为1，重复确认累加
        if (p.status !== 'removed') {
          p.confirm_count = 1;
        } else {
          p.confirm_count = (p.confirm_count || 0) + 1;
        }
        p.last_removed_report_time = Date.now();
        p.status = 'removed';
        p.recovery_count = 0;
        p.last_recovery_report_time = null;
        const tier = removedTier(p);
        showToast(tier === 'confirmed' ? '已确认拆除（多人反馈），感谢你拯救下一条内裤' : '已记录疑似拆除，等待二次确认');
      } else if (newStatus === 'open' && isRemoved) {
        // 恢复链路：recovery_count++，confirm_count 重置（恢复后开放确认需重新累积）
        p.recovery_count = (p.recovery_count || 0) + 1;
        p.last_recovery_report_time = Date.now();
        p.status = 'open';
        p.confirm_count = 0;
        p.last_confirm_time = null;
        const rt = recoveryTier(p);
        showToast(rt === 'confirmed' ? '已确认恢复开放（多人复核），误报已清除' : '已记录疑似恢复，等待二次确认（单人复核不直接推翻拆除）');
      } else if (newStatus === 'open') {
        // 开放确认：分三种情况
        // 1. 疑似恢复中（recovery_count > 0 但未确认）：再次点开放 = 确认恢复（recovery_count++）
        // 2. 从锁门/维修恢复开放：重置计数器，确认人从1开始
        // 3. 已经是开放中：confirm_count++（pending→suspected→verified）
        if ((p.recovery_count || 0) === 1) {
          // 疑似恢复（recovery_count=1）→ 二次点击 = 确认恢复
          p.recovery_count = (p.recovery_count || 0) + 1;
          p.last_recovery_report_time = Date.now();
          p.confirm_count = p.recovery_count >= 2 ? 2 : 1; // 恢复确认后开放确认也同步
          if (p.recovery_count >= 2) p.last_confirm_time = Date.now();
          const rt = recoveryTier(p);
          showToast(rt === 'confirmed' ? '已确认恢复开放（多人复核），误报已清除' : '已记录疑似恢复，等待二次确认（单人复核不直接推翻拆除）');
        } else if (p.status === 'locked' || p.status === 'repair') {
          p.confirm_count = 1;
          p.recovery_count = 0;
          p.last_recovery_report_time = null;
          p.last_confirm_time = Date.now();
          p.status = 'open';
          showToast('已上报：已开放，感谢你拯救下一条内裤');
        } else {
          p.confirm_count = (p.confirm_count || 0) + 1;
          p.last_confirm_time = Date.now();
          p.status = 'open';
          showToast(p.confirm_count >= POINT_CONFIRM_THRESHOLD ? '已确认开放（多人确认）' : '已确认存在，等待二次确认');
        }
      } else {
        // 锁门/维修：状态变更，开放确认作废
        p.status = newStatus;
        p.confirm_count = 0;
        p.last_confirm_time = null;
        p.recovery_count = 0;
        p.last_recovery_report_time = null;
        showToast('已上报：' + STATUS_MAP[newStatus].label + '，感谢你拯救下一条内裤');
      }
      p.last_update = Date.now();
      saveUserToilets();
      renderMarkers();
      renderNearbyList();
      openPanel(p);
    });
  });

  /* 补充设施标签点击：按 data-action 分发（add 补充 / revoke 撤销）
     统一用 ensurePersisted 保证修改落在持久化对象上 */
  body.querySelectorAll('.supplement-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tag = btn.dataset.supplement;
      const action = btn.dataset.action;
      const tagLabel = tag === 'accessible' ? '♿ 无障碍' : tag === 'family' ? '👨‍👩‍👧 第三卫生间' : '🚐 房车水源';

      // 持久化对象：直接修改
      // 非持久化对象（MOCK拷贝/live拷贝）：先 ensurePersisted 提升
      // 但 amap-live 点位的标签补充走 tagSupplements（坐标匹配），不 promote，
      // 因为 live 点位是临时搜索结果，下次搜索可能消失，用坐标匹配更可靠
      const isPersisted = t.id && t.id.startsWith('user_');
      const isLive = t.source === 'amap-live';

      if (action === 'add') {
        if (isPersisted) {
          // 已持久化：直接改对象
          t[tag] = true;
          t.last_update = Date.now();
          saveUserToilets();
          showToast('已补充：' + tagLabel);
        } else if (isLive) {
          // live 点位：走坐标匹配补充（count+1）
          addTagSupplement(t.lat, t.lng, tag);
          const status = getSupplementStatus(t, tag);
          showToast(status === 'confirmed'
            ? '已确认：' + tagLabel + '（多人补充）'
            : '已补充：' + tagLabel + '（待二次确认）');
        } else {
          // MOCK 点位（amap/amap+user/user 的浅拷贝）：提升到 userToilets
          const p = ensurePersisted(t);
          p[tag] = true;
          saveUserToilets();
          showToast('已补充：' + tagLabel + '（已纳入众包数据）');
          renderMarkers(); renderNearbyList();
          openPanel(p);
          return;
        }
      } else if (action === 'revoke') {
        if (isPersisted) {
          t[tag] = false;
          t.last_update = Date.now();
          saveUserToilets();
          showToast('已撤销：' + tagLabel);
        } else if (isLive) {
          removeTagSupplement(t.lat, t.lng, tag);
          showToast('已撤销：' + tagLabel);
        } else {
          // MOCK 拷贝上的撤销：说明之前补充过（走 tagSupplements），直接减 count
          removeTagSupplement(t.lat, t.lng, tag);
          showToast('已撤销：' + tagLabel);
        }
      }

      renderMarkers();
      renderNearbyList();
      openPanel(isPersisted ? t : (isLive ? t : t));  // 非 persist 非 live 已在上面 return
    });
  });

  /* 位置描述补充：点击"补充"按钮校验并提交
     逻辑：
     - 已持久化点位（user_）且 t.desc 为空：直接写 t.desc
     - 已持久化点位且 t.desc 已有：走 descSupplements 追加
     - amap-live 点位：走 descSupplements 坐标匹配，不 promote
     - Mock 点位且 t.desc 为空：先 ensurePersisted 提升，再写 p.desc
     - Mock 点位且 t.desc 已有：走 descSupplements 追加 */
  const descSupplementBtn = body.querySelector('#descSupplementBtn');
  if (descSupplementBtn) {
    descSupplementBtn.addEventListener('click', () => {
      const input = body.querySelector('#descSupplementInput');
      const val = input.value.trim();
      // 校验：非空、最少5字（与上报面板位置描述校验一致）
      if (!val) { showToast('请输入位置描述'); return; }
      if (val.length < 5) { showToast('位置描述至少 5 个字'); return; }

      const isPersisted = t.id && t.id.startsWith('user_');
      const isLive = t.source === 'amap-live';

      if (isPersisted) {
        if (!t.desc) {
          // 已持久化且无 desc：直接写 t.desc
          t.desc = val;
          t.last_update = Date.now();
          saveUserToilets();
          showToast('已补充位置描述');
        } else {
          // 已有 desc：走 descSupplements 追加新视角
          addDescSupplement(t.lat, t.lng, val);
          showToast('已补充位置描述（待二次确认）');
        }
        renderMarkers(); renderNearbyList();
        openPanel(t);
      } else if (isLive) {
        // live 点位：走坐标匹配补充
        addDescSupplement(t.lat, t.lng, val);
        showToast('已补充位置描述（待二次确认）');
        renderMarkers(); renderNearbyList();
        openPanel(t);
      } else {
        // Mock 点位
        if (!t.desc) {
          // 无 desc：先 ensurePersisted 提升，再写 p.desc
          const p = ensurePersisted(t);
          p.desc = val;
          p.last_update = Date.now();
          saveUserToilets();
          showToast('已补充位置描述');
          renderMarkers(); renderNearbyList();
          openPanel(p);
        } else {
          // 已有 desc：走 descSupplements 追加
          addDescSupplement(t.lat, t.lng, val);
          showToast('已补充位置描述（待二次确认）');
          renderMarkers(); renderNearbyList();
          openPanel(t);
        }
      }
    });
  }

  /* "我有补充"按钮：点击展开/收起输入框 */
  const descAddToggleBtn = body.querySelector('#descAddToggleBtn');
  if (descAddToggleBtn) {
    descAddToggleBtn.addEventListener('click', () => {
      const row = body.querySelector('#descInputRow');
      if (row) {
        row.classList.toggle('desc-input-hidden');
        if (!row.classList.contains('desc-input-hidden')) {
          // 展开时聚焦输入框
          const input = row.querySelector('#descSupplementInput');
          if (input) input.focus();
        }
      }
    });
  }

  /* "👍 描述准确"按钮：对该描述 count+1（confirmDescSupplement） */
  body.querySelectorAll('.desc-confirm-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const descText = btn.dataset.descConfirm;
      confirmDescSupplement(t.lat, t.lng, descText);
      // 查询更新后的状态
      const list = getDescSupplementList(t);
      const updated = list.find(d => d.text === descText);
      if (updated && updated.count === SUPPLEMENT_CONFIRM_THRESHOLD) {
        showToast('已确认位置描述（多人验证）');
      } else {
        showToast('感谢确认');
      }
      renderMarkers(); renderNearbyList();
      openPanel(t);
    });
  });

  /* "撤销"按钮：仅 pending&count=1 显示，移除该描述 */
  body.querySelectorAll('.desc-undo-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const descText = btn.dataset.descUndo;
      const isPersisted = t.id && t.id.startsWith('user_');

      if (isPersisted && t.desc === descText) {
        // 已持久化点位且 t.desc 就是这条：清空 t.desc
        t.desc = '';
        t.last_update = Date.now();
        saveUserToilets();
      }
      // 走 descSupplements 撤销（对所有来源都调用）
      removeDescSupplement(t.lat, t.lng, descText);
      showToast('已撤销补充');
      renderMarkers(); renderNearbyList();
      openPanel(isPersisted ? t : t);
    });
  });

  const cSubmit = body.querySelector('#cSubmit');
  if (cSubmit) {
    cSubmit.addEventListener('click', () => {
      const rating = parseInt(body.querySelector('#cRating').value);
      const text = body.querySelector('#cText').value.trim();
      if (!text) { showToast('说点啥再发'); return; }
      const now = new Date();
      const time = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
      // 评论也需要持久化：先 ensurePersisted 再操作
      const p = ensurePersisted(t);
      p.comments.unshift({ user: '你', rating, text, time });
      const sum = p.comments.reduce((a, c) => a + c.rating, 0);
      p.rating = sum / p.comments.length;
      p.last_update = Date.now();
      saveUserToilets();
      showToast('评论已发布');
      renderMarkers();
      renderNearbyList();
      openPanel(p);
    });
  }

  /* ============ 导航前往：底部 ActionSheet 选择高德/百度 ============ */
  const navBtn = body.querySelector('#navBtn');
  if (navBtn) {
    navBtn.addEventListener('click', () => showNavActionSheet(t));
  }

  document.getElementById('panel').classList.add('is-show', 'is-half');
  document.getElementById('panel').classList.remove('is-expanded');
  if (window.innerWidth < 768 && window._setPanelSnap) {
    window._setPanelSnap('half', false);
  }

  if (window.innerWidth < 768) {
    requestAnimationFrame(() => panToiletToVisibleArea(t));
    setTimeout(() => { if (currentToilet === t) panToiletToVisibleArea(t); }, 350);
  }
}

/* ============ 地图自动平移：底部 Sheet 弹出时将关注点移到可见区域 ============ */
/* 通用函数：计算 panel 和 nearby-list 中最高的遮挡线（遮挡线以上为可见地图区域），
   将指定 latlng 平移到遮挡线上方 48px 安全边距处。
   拖拽过程中每帧调用，使用 {animate:false} 实现跟手；动画结束后调用使用动画平滑。
   关注点优先级：currentToilet（详情面板打开时）→ 指定 latlng → searchCenter（列表展开时） */
function panToVisibleArea(latlng, animate) {
  if (window.innerWidth >= 768) return;
  if (!map || !map.getSize) return;
  const mapSize = map.getSize();
  if (!mapSize || !mapSize.x || !mapSize.y) return;

  const mapRect = map.getContainer().getBoundingClientRect();

  /* 找出底部所有 sheet 中最靠上的顶部 Y 坐标（即遮挡线）：
     两个 sheet 不会同时完全展开（openPanel 时 nearbyList display:none），
     但拖拽过渡期间可能短暂重叠，取较高的遮挡线确保安全 */
  let sheetTopY = mapSize.y; // 默认无遮挡
  const panelEl = document.getElementById('panel');
  const listEl = document.getElementById('nearbyList');

  if (panelEl && panelEl.classList.contains('is-show')) {
    const pr = panelEl.getBoundingClientRect();
    const topInMap = pr.top - mapRect.top;
    if (topInMap > 0 && topInMap < sheetTopY) sheetTopY = topInMap;
  }
  const listHidden = listEl && (listEl.style.display === 'none' || listEl.classList.contains('is-collapsed'));
  if (listEl && !listHidden) {
    const lr = listEl.getBoundingClientRect();
    const topInMap = lr.top - mapRect.top;
    if (topInMap > 0 && topInMap < sheetTopY) sheetTopY = topInMap;
  }

  // 安全边距：marker 高度 + 间距
  const safeY = sheetTopY - 48;
  if (safeY <= 80) return; // 可见区域太小，不平移

  // 确定关注点：优先用传入 latlng，其次 currentToilet，最后 searchCenter
  let focus = latlng;
  if (!focus && currentToilet && currentToilet.lat && currentToilet.lng) {
    focus = [currentToilet.lat, currentToilet.lng];
  }
  if (!focus && typeof searchCenter !== 'undefined' && searchCenter) {
    focus = searchCenter;
  }
  if (!focus) return;

  const currentPoint = map.latLngToContainerPoint(focus);
  if (!currentPoint || isNaN(currentPoint.x) || isNaN(currentPoint.y)) return;
  // 如果关注点已在可见区域（safeY 以上），不需要向下平移
  // 注意：只处理向下平移（POI 被底部遮挡），不处理向上平移（避免卡片收起时地图跳动）
  if (currentPoint.y <= safeY) return;
  const dy = currentPoint.y - safeY;
  // 水平居中
  const dx = Math.round(mapSize.x / 2) - currentPoint.x;
  if (isNaN(dx) || isNaN(dy)) return;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
    map.panBy([dx, dy], animate ? { animate: true, duration: 0.3 } : { animate: false });
  }
}

/* 兼容旧函数名：详情面板打开时平移当前厕所到可见区 */
function panToiletToVisibleArea(t) {
  if (!t) return;
  panToVisibleArea([t.lat, t.lng], true);
}

/* 关闭详情面板（清除高亮、关闭移动端 sheet、恢复 nearbyList 显示） */
function closePanel() {
  closeNavActionSheet();
  clearMarkerHighlight();
  const panel = document.getElementById('panel');
  if (window.innerWidth < 768 && window._closePanelMobile) {
    window._closePanelMobile();
    return;
  }
  panel.classList.remove('is-show', 'is-half', 'is-expanded', 'is-compact');
  panel.style.transform = '';
  panel.style.transition = '';
  currentToilet = null;
  clearPickMode();
  document.getElementById('nearbyList').style.display = '';
}

/* 暴露给 app.js：拖拽过程中实时平移地图让关注点可见 */
window.panToVisibleArea = panToVisibleArea;

window.panelHeightChanged = function() {

/* 检测微信内置浏览器（不可拉起原生 App，直接走网页版） */
function isWeixinBrowser() {
  return /MicroMessenger/i.test(navigator.userAgent);
}

/* 打开导航 ActionSheet：选择高德/百度地图拉起导航 */
function showNavActionSheet(t) {
  // 若已存在先移除，避免重复 DOM
  closeNavActionSheet();

  // 构造遮罩 + 底部 Sheet
  const overlay = document.createElement('div');
  overlay.className = 'nav-sheet-overlay';
  overlay.id = 'navSheetOverlay';

  const sheet = document.createElement('div');
  sheet.className = 'nav-sheet';
  sheet.innerHTML = `
    <div class="nav-sheet__handle" aria-hidden="true"></div>
    <div class="nav-sheet__title">选择导航地图</div>
    <button class="nav-sheet__item" data-map="amap" type="button">
      <span class="nav-sheet__icon">🗺️</span><span class="nav-sheet__label">高德地图</span>
    </button>
    <button class="nav-sheet__item" data-map="baidu" type="button">
      <span class="nav-sheet__icon">📍</span><span class="nav-sheet__label">百度地图</span>
    </button>
    <button class="nav-sheet__item nav-sheet__item--cancel" data-map="cancel" type="button">取消</button>
  `;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);

  // 触发动画（下一帧加上 is-show，过渡到可见状态）
  requestAnimationFrame(() => overlay.classList.add('is-show'));

  // 点击遮罩关闭
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeNavActionSheet();
  });

  // 选项点击：分发到对应地图
  sheet.querySelectorAll('.nav-sheet__item').forEach(btn => {
    btn.addEventListener('click', () => {
      const map = btn.dataset.map;
      if (map === 'cancel') {
        closeNavActionSheet();
        return;
      }
      launchMapNav(map, t);
      closeNavActionSheet();
    });
  });
}

/* 关闭导航 ActionSheet：移除 DOM */
function closeNavActionSheet() {
  const overlay = document.getElementById('navSheetOverlay');
  if (!overlay) return;
  overlay.classList.remove('is-show');
  // 等过渡动画结束再移除 DOM（200ms）
  setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 220);
}

/* 拉起地图导航：移动端先试 URI Scheme，2s 未跳转则降级网页版；微信/PC 直接网页版 */
// GCJ-02（高德坐标系）转 BD-09（百度坐标系）
// 百度地图使用 BD-09 坐标系，直接传 GCJ-02 会偏移几十到几百米
// 转换公式：百度官方公开算法
function gcj02ToBd09(gcjLat, gcjLng) {
  const x = gcjLng, y = gcjLat;
  const z = Math.sqrt(x * x + y * y) + 0.00002 * Math.sin(y * Math.PI * 3000.0 / 180.0);
  const theta = Math.atan2(y, x) + 0.000003 * Math.cos(x * Math.PI * 3000.0 / 180.0);
  const bdLng = z * Math.cos(theta) + 0.0065;
  const bdLat = z * Math.sin(theta) + 0.006;
  return { lat: bdLat, lng: bdLng };
}

function launchMapNav(map, t) {
  const lat = t.lat;
  const lng = t.lng;
  const name = encodeURIComponent(t.name || '厕所');
  // 平台检测：iOS 与 Android 使用不同的高德导航 scheme
  const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  // 百度坐标转换：GCJ-02 → BD-09（避免百度地图偏移）
  const bd = gcj02ToBd09(lat, lng);

  // 网页版降级 URL（新标签页打开）
  let webUrl = '';
  if (map === 'amap') {
    // 高德网页版：position=lng,lat，coordinate=gaode 表示 GCJ-02
    webUrl = `https://uri.amap.com/marker?position=${lng},${lat}&name=${name}&src=厕哪&coordinate=gaode`;
  } else if (map === 'baidu') {
    // 百度网页版：location=lat,lng，coord_type=gcj02 由百度服务端转换
    // 但实测网页版 coord_type 参数可靠，可直接传 GCJ-02
    webUrl = `https://api.map.baidu.com/marker?location=${lat},${lng}&title=${name}&content=厕哪&output=html&coord_type=gcj02&src=厕哪`;
  } else {
    return;
  }

  // 微信内置浏览器 / 桌面端：直接打开网页版（无法拉起原生 App）
  if (isWeixinBrowser() || !('ontouchstart' in window)) {
    window.open(webUrl, '_blank');
    return;
  }

  // 移动端：构造 URI Scheme 拉起地图 App 显示 POI 标注（用户可点击进入详情页/发起导航）
  let scheme = '';
  if (map === 'amap') {
    // 高德 viewMap（地图标注）：Android 用 androidamap://，iOS 用 iosamap://
    // 坐标已是 GCJ-02，dev=0 表示无需偏移转换
    const prefix = isIOS ? 'iosamap' : 'androidamap';
    scheme = `${prefix}://viewMap?sourceApplication=${encodeURIComponent('厕哪')}&poiname=${name}&lat=${lat}&lon=${lng}&dev=0`;
  } else if (map === 'baidu') {
    // 百度 marker（地图打点）：baidumap://map/marker
    // 原生 App 的 coord_type 参数不可靠，直接传转换后的 BD-09 坐标
    scheme = `baidumap://map/marker?location=${bd.lat},${bd.lng}&title=${name}&content=${encodeURIComponent('厕哪')}&src=${encodeURIComponent('andr.cena.findtoilet')}`;
  }

  // 记录跳转前时间戳，2s 内未离开页面视为拉起失败
  let hidden = false;
  document.addEventListener('visibilitychange', function onVis() {
    if (document.hidden) hidden = true;
    document.removeEventListener('visibilitychange', onVis);
  });

  try {
    window.location.href = scheme;
  } catch (e) {}

  // 2 秒后检查是否仍停留在页面 → 降级网页版
  setTimeout(() => {
    if (!hidden && !document.hidden) {
      window.open(webUrl, '_blank');
    }
  }, 2000);
}

/* ============ 新增厕所点位上报（含真伪验证第 1 层） ============ */
async function openAddToiletPanel() {

      if (goExist) goExist.addEventListener('click', () => {
        closePanel();
        openPanel(nearby[0]);

  }

  body.innerHTML = `

    <div class="report-section">
      <h3>名称（必填）</h3>

    </div>

    <div class="report-section">
      <h3>位置描述（必填，用于导航找厕所）<span id="descHint" style="font-weight:400;color:var(--text-hint);">至少 5 字</span></h3>
      <input id="newDesc" type="text" placeholder="如：村口大槐树后红砖房、3楼B口出来右转50米" class="report-input" />
    </div>

    <div class="report-section">
      <h3>当前状态</h3>
      <div class="report-btns">
        <div class="report-btn is-active" data-new-status="open"><span class="emoji">🟢</span>开放中</div>
        <div class="report-btn" data-new-status="locked"><span class="emoji">🔴</span>已锁门</div>
        <div class="report-btn" data-new-status="repair"><span class="emoji">🟠</span>维修中</div>

      <h3>标签（可多选）</h3>
      <div class="report-btns">
        <div class="report-btn" data-new-tag="accessible"><span class="emoji">♿</span>无障碍</div>
        <div class="report-btn" data-new-tag="family"><span class="emoji">👨‍👩‍👧</span>第三卫生间</div>

  // 面板打开时隐藏周边列表

    if (!desc) { showToast('请输入位置描述（帮人找到厕所）'); return; }

    // 围栏内：跳过 regeo（围栏本身已过滤海上/荒野）；围栏外：直接拒绝
    if (!isInGeofence(parseFloat(lat), parseFloat(lng))) {
      showToast('当前坐标超出 Demo 服务区（滨海新区），无法上报');
      btn.disabled = false; btn.innerHTML = '提交上报';

    }

    const newToilet = {

      name, desc, lat: parseFloat(lat), lng: parseFloat(lng),
      source: 'user', status: newStatus,
      accessible: newTags.accessible, family: newTags.family, water: newTags.water,
      rating: 0, last_update: Date.now(), created_by: 'you',
      // 上报者自己是第一个确认人：confirm_count=1（pending→suspected）
      // 报"不存在"也走疑似拆除链路（confirm_count=1，removedTier 判定 suspected）
      confirm_count: 1, last_confirm_time: Date.now(),
      recovery_count: 0, last_recovery_report_time: null,
      last_removed_report_time: newStatus === 'removed' ? Date.now() : null,
      comments: []
    };

    addUserToilet(newToilet);
    incrReportCount();
    // 先退出拾取模式再渲染（避免图钉被 renderMarkers 误清）
    clearPickMode();
    renderMarkers();
    renderNearbyList();
    closePanel();
    showToast('已上报：' + name + '（待核实，需2人确认）');
    setTimeout(() => openPanel(newToilet), 300);
  });

  // 初始以 compact 态弹出（约一条半高），上滑可展开至 expanded
  document.getElementById('panel').classList.add('is-show', 'is-compact');
  document.getElementById('panel').classList.remove('is-expanded', 'is-half');

  }
}

/* ============ nav-bar 联动底部 Sheet 高度 ============ */
/* nav-bar 现位于右侧竖向排列，水平方向不再与 sheet 冲突；
   但面板/列表展开较高时仍会纵向遮挡 nav-bar，故需上浮到 sheet 顶部上方。
   实现：通过 CSS 变量 --nav-bar-bottom 统一控制 nav-bar 和 legend-popup 的 bottom
   （right 定位不影响 bottom 计算，JS 无需关心水平位置）
   覆盖时机：MutationObserver 监听 panel + nearbyList class/style 变化，
            app.js 拖拽 move 中同步调用 */
function updateNavBarPosition() {
  // 桌面端 nav-bar 在右下角，不联动
  if (window.innerWidth >= 768) return;
  const panel = document.getElementById('panel');
  const list = document.getElementById('nearbyList');
  if (!panel || !list) return;

  const panelVisible = panel.classList.contains('is-show');
  const listCollapsed = list.classList.contains('is-collapsed');
  // display:none 的元素 getBoundingClientRect 返回全0，需要额外排除
  const listHidden = list.style.display === 'none';

  // 所有 Sheet 都关闭/收起：回到默认底部位置
  if (!panelVisible && (listCollapsed || listHidden)) {
    document.documentElement.style.removeProperty('--nav-bar-bottom');
    return;
  }

  // 取两个 Sheet 中更靠近视口顶部（top 更小）的那个作为上浮基准
  // 用 getBoundingClientRect().top 获取元素真实可见位置（反映 transform 动画状态）
  let top = window.innerHeight;
  if (panelVisible) {
    const pr = panel.getBoundingClientRect();
    // 只有当面板真正进入视口（top < innerHeight）时才参与计算
    if (pr.top < top && pr.top < window.innerHeight) top = pr.top;
  }
  if (!listCollapsed && !listHidden) {
    const lr = list.getBoundingClientRect();
    if (lr.top < top && lr.top < window.innerHeight) top = lr.top;
  }

  // nav-bar 放在 Sheet 顶部上方 8px 间距
  const visibleHeight = window.innerHeight - top;
  const desiredBottom = visibleHeight + 8;
  // 防穿模：nav-bar 顶部不能超过 topbar 底部，否则会盖住搜索栏
  const navBarEl = document.querySelector('.nav-bar');
  const navBarH = navBarEl ? navBarEl.getBoundingClientRect().height : 0;
  const topbarEl = document.querySelector('.topbar');
  const topbarBottom = topbarEl ? topbarEl.getBoundingClientRect().bottom : 0;
  const maxBottom = window.innerHeight - topbarBottom - navBarH - 8;
  if (maxBottom > 0) {
    // 有空间：clamp 到不超过 topbar 底部
    document.documentElement.style.setProperty('--nav-bar-bottom', `${Math.min(desiredBottom, maxBottom)}px`);
  } else {
    // 空间不足（列表全展开）：nav-bar 放到屏幕底部，被列表遮住（z-index 900 < 999）
    document.documentElement.style.setProperty('--nav-bar-bottom', `0px`);
  }
}

// 监听 panel 和 nearbyList 的 class/style 变化（覆盖 setSnap、openPanel、closePanel、列表展开/收起等）
const _sheetObserver = new MutationObserver(() => updateNavBarPosition());
_sheetObserver.observe(document.getElementById('panel'), { attributes: true, attributeFilter: ['class', 'style'] });
_sheetObserver.observe(document.getElementById('nearbyList'), { attributes: true, attributeFilter: ['class', 'style'] });

// panel transform/max-height transition 结束后重新计算（动画过程中 getBoundingClientRect 不稳定）
document.getElementById('panel').addEventListener('transitionend', (e) => {
  if (e.propertyName === 'transform' || e.propertyName === 'max-height') {
    updateNavBarPosition();
  }
});
// nearby-list max-height transition 结束后重新计算
document.getElementById('nearbyList').addEventListener('transitionend', (e) => {
  if (e.propertyName === 'max-height') {
    updateNavBarPosition();
  }
});

// 窗口尺寸变化时重算（如旋转屏幕）
window.addEventListener('resize', updateNavBarPosition);

/* ============ snap 过渡期间持续同步 nav-bar 位置 ============ */
/* 列表/面板 snap 动画期间，用 rAF 循环每帧更新 CSS 变量，
   同时禁用 nav-bar 自身的 bottom transition，避免 nav-bar 慢半拍。
   地图平移在过渡结束后做一次带动画的 pan，不在每帧调用避免干扰。 */
let _navSyncRafId = null;
window.syncNavBarDuringTransition = function(duration) {
  if (window.innerWidth >= 768) return;
  document.body.classList.add('is-dragging-sheet');
  if (_navSyncRafId) cancelAnimationFrame(_navSyncRafId);
  const start = performance.now();
  function tick() {
    updateNavBarPosition();
    if (performance.now() - start < duration) {
      _navSyncRafId = requestAnimationFrame(tick);
    } else {
      _navSyncRafId = null;
      document.body.classList.remove('is-dragging-sheet');
      updateNavBarPosition();
      // 过渡结束后做一次带动画的地图平移，让关注点移到卡片上方可见区
      if (window.panToVisibleArea) panToVisibleArea(null, true);
    }
  }
  _navSyncRafId = requestAnimationFrame(tick);
};

// 暴露给 app.js 拖拽过程中同步调用（MutationObserver 是异步微任务，拖拽时需同步更新避免延迟）
window.updateNavBarPosition = updateNavBarPosition;

// 初始调用：页面加载时 nearby-list 默认展开，MutationObserver 不会触发初始状态
// 延迟一帧确保 DOM 布局完成
requestAnimationFrame(() => updateNavBarPosition());


/* === ui/nearby.js === */
/* ui/nearby.js — 周边推荐列表（按 Haversine 距离排序）
   依赖：core/geo.js, core/status.js, ui/map.js, ui/panel.js (openPanel)
   复赛迁移：web/src/components/NearbyList.ts
*/

function renderNearbyList() {
  const allToilets = getAllToilets();
  // 筛选 → 计算距离 → 按距离升序排序
  const items = allToilets
    .filter(toiletPassesFilter)
    .map(t => {
      const dist = t._dist || haversine(searchCenter[0], searchCenter[1], t.lat, t.lng);
      return { t, dist };
    })
    .sort((a, b) => a.dist - b.dist);

  document.getElementById('nearbyTitle').textContent = searchCenterName + '附近厕所';

  const container = document.getElementById('nearbyItems');
  // 空数据处理
  if (items.length === 0) {
    container.innerHTML = '<div style="padding:14px;color:var(--text-sub);font-size:13px;text-align:center;">附近暂无厕所数据</div>';
    return;
  }

  // 移动端限流：屏幕小，列表太长影响体验，最多显示 20 条
  const MOBILE_MAX = 20;
  const isMobile = window.innerWidth < 768;
  const totalCount = items.length;
  // 桌面端不限制（取全部），移动端取最近的 N 条
  const displayItems = isMobile ? items.slice(0, MOBILE_MAX) : items;
  const displayCount = displayItems.length;
  // 是否触发了截断（仅移动端且总数超过限制时为 true）
  const isTruncated = isMobile && totalCount > displayCount;

  // 渲染列表项（idx 为显示序号，用于编号）
  container.innerHTML = displayItems.map((item, idx) => {
    const t = item.t;
    const d = formatDist(item.dist);
    const cls = markerClass(t);
    const numCls = cls;
    const subParts = [];
    if (t.source === 'amap-live') {
      subParts.push('🟣 实时');
    } else {
      const st = statusMeta(t);
      subParts.push(st.emoji + ' ' + st.label);
    }
    if (t.accessible) subParts.push('♿');
    if (t.family) subParts.push('👨‍👩‍👧');
    if (t.water) subParts.push('🚐');
    const distText = d.text.replace(/([0-9.]+)(.*)/, '<span class="dist-num">$1</span>$2');
    return `
      <div class="nearby-item" data-id="${t.id}">
        <div class="nearby-item__num ${numCls}">${idx + 1}</div>
        <div class="nearby-item__body">
          <div class="nearby-item__name">${t.name}</div>
          ${t.desc ? `<div class="nearby-item__desc">${t.desc}</div>` : ''}
          <div class="nearby-item__sub">${subParts.join(' · ')}</div>
        </div>
        <div class="nearby-item__dist">${distText}<span class="nearby-item__walk">${d.walk}</span></div>
      </div>
    `;
  }).join('') + (isTruncated
    // 截断时在列表底部追加提示：灰色小字、居中、padding 与空数据样式一致
    ? `<div style="padding:14px;color:var(--text-sub);font-size:13px;text-align:center;">已显示最近 ${displayCount} 条，共 ${totalCount} 条</div>`
    : '');

  // 仅对实际渲染出的 nearby-item 绑定点击事件（提示 div 不含 .nearby-item，不会被绑定）
  container.querySelectorAll('.nearby-item').forEach(el => {
    el.addEventListener('click', () => {
      const t = getAllToilets().find(x => x.id === el.dataset.id);
      if (t) {
        map.setView([t.lat, t.lng], 17);
        openPanel(t);
        collapseNearbyList();
      }
    });
  });
}

function toggleNearbyList() {
  // 优先走三档 snap 的 toggle 逻辑（collapsed↔half）
  if (window._toggleNearbySheet) {
    window._toggleNearbySheet();
  } else {
    const list = document.getElementById('nearbyList');
    list.classList.toggle('is-collapsed');
  }
}

/* 展开周边列表到预览档（half）：用户主动操作（搜索/长按/点击）时调用 */
function expandNearbyList() {
  if (window._toggleNearbySheet) {
    // 如果当前是 collapsed，toggle 到 half；如果已是 half/expanded 则不变
    const list = document.getElementById('nearbyList');
    if (list.classList.contains('is-collapsed')) {
      window._toggleNearbySheet();
    }
  } else {
    document.getElementById('nearbyList').classList.remove('is-collapsed');
  }
}

/* 收起周边列表：点击marker/打开面板/点击空白时调用 */
function collapseNearbyList() {
  document.getElementById('nearbyList').classList.add('is-collapsed');
  // 重置内联 maxHeight 让 CSS is-collapsed 生效
  document.getElementById('nearbyList').style.maxHeight = '';
}

/* ui/search.js — 搜索 + 联想（纯本地，0 API 调用）
   依赖：core/geo.js, data/toilets.js, data/config.js, ui/utils.js, ui/map.js, ui/nearby.js
   全量公厕数据已预拉取到 MOCK_TOILETS（175条），搜索/周边筛选全部本地完成
*/

let searchCenter, searchCenterName = '海港公园', searchPinMarker = null;

/* 本地全量数据筛选：从 MOCK_TOILETS 中按距离排序，0 API 调用
   数据已全量拉取滨海新区公厕（175条），无需实时调 around API */
const LOCAL_SEARCH_RADIUS = 3000;  // 3km 半径

function fetchNearbyToilets(coords) {
  const [lat, lng] = coords;
  const nearby = MOCK_TOILETS
    .map(t => ({
      ...t,
      _dist: haversine(lat, lng, t.lat, t.lng)
    }))
    .filter(t => t._dist <= LOCAL_SEARCH_RADIUS)
    .sort((a, b) => a._dist - b._dist);
  return Promise.resolve(nearby);
}

function renderSuggest(items) {
  const box = document.getElementById('searchSuggest');
  if (!items || items.length === 0) {
    box.innerHTML = '<div class="suggest-empty">无匹配地点</div>';
    box.classList.add('is-show');
    return;
  }
  box.innerHTML = items.map((it, idx) => {
    const dist = it.dist !== undefined ? formatDist(it.dist).text : '';
    return `
      <div class="suggest-item" data-idx="${idx}">
        <span class="suggest-item__icon">${it.icon || '📍'}</span>
        <div class="suggest-item__body">
          <div class="suggest-item__name">${it.name}</div>
          <div class="suggest-item__addr">${it.addr || ''}</div>
        </div>
        ${dist ? `<span class="suggest-item__dist">${dist}</span>` : ''}
      </div>
    `;
  }).join('');
  box.classList.add('is-show');
  box.querySelectorAll('.suggest-item').forEach(el => {
    el.addEventListener('click', () => {
      const item = items[parseInt(el.dataset.idx)];
      selectSuggest(item);
    });
  });
}

function selectSuggest(item) {
  document.getElementById('searchSuggest').classList.remove('is-show');
  document.getElementById('searchInput').value = item.name;
  const [lng, lat] = item.location.split(',').map(Number);
  setSearchCenter([lat, lng], item.name, 15);
  showToast('已定位到：' + item.name + '，周边厕所已更新');
}

function setSearchCenter(coords, name, zoom, ensureToilet, silent) {
  searchCenter = coords;
  searchCenterName = name;
  if (searchPinMarker) map.removeLayer(searchPinMarker);
  // 定位已写死海港公园：USER_LOC 就是海港公园，显示脉冲蓝点不额外加图钉
  const isUserLoc = (coords === USER_LOC) || (name === '海港公园');
  if (!isUserLoc) {
    const pinIcon = L.divIcon({
      className: 'search-pin-marker',
      html: `<div class="search-pin"><div class="search-pin__head"><span class="emoji">🔍</span></div><div class="search-pin__label">${name}</div></div>`,
      iconSize: [80, 65],
      iconAnchor: [40, 36]
    });
    searchPinMarker = L.marker(coords, { icon: pinIcon, zIndexOffset: 1000, interactive: false }).addTo(map);
  } else {
    searchPinMarker = null;
  }
  map.setView(coords, zoom || 15);

  // 本地全量数据筛选：0 API 调用
  const nearby = MOCK_TOILETS
    .map(t => ({ ...t, _dist: haversine(coords[0], coords[1], t.lat, t.lng) }))
    .filter(t => t._dist <= LOCAL_SEARCH_RADIUS)
    .sort((a, b) => a._dist - b._dist);

  // 合并 ensureToilet（搜索选中的厕所 POI 确保显示）
  if (ensureToilet) {
    const exists = nearby.some(t => Math.abs(t.lat - ensureToilet.lat) < 1e-6 && Math.abs(t.lng - ensureToilet.lng) < 1e-6);
    if (!exists) nearby.unshift(ensureToilet);
  }

  liveToilets = nearby;
  renderMarkers();
  renderNearbyList();
  if (nearby.length > 0 && !isUserLoc) {
    showToast(`已加载${name}周边${nearby.length}个厕所`);
  }

  /* silent=true（初始加载/刷新）：不自动展开列表，保持收起状态
     silent=false（用户主动搜索/长按/点击地图）：展开到预览档（half），snap 后平移地图让搜索中心可见 */
  if (!silent) {
    expandNearbyList();
    // 列表展开 snap 动画结束后，平移地图让搜索中心出现在卡片上方
    if (window.syncNavBarDuringTransition) {
      window.syncNavBarDuringTransition(400);
    }
  }
}

const onSearchInput = debounce(() => {
  const q = document.getElementById('searchInput').value.trim();
  const box = document.getElementById('searchSuggest');
  if (q.length < 2) { box.classList.remove('is-show'); return; }

  // 纯本地搜索：全量数据已在本地，0 API 调用
  const items = [];
  MOCK_TOILETS.forEach(t => {
    if (t.name.includes(q) || (t.address && t.address.includes(q))) {
      const dist = haversine(searchCenter[0], searchCenter[1], t.lat, t.lng);
      items.push({ name: t.name, addr: t.address || '公共厕所', location: t.lng + ',' + t.lat, icon: '🚾', dist });
    }
  });
  Object.entries(PRESET_LOCATIONS).forEach(([key, coords]) => {
    if (q.includes(key) || key.includes(q)) {
      const dist = haversine(searchCenter[0], searchCenter[1], coords[0], coords[1]);
      items.push({ name: key, addr: '地点', location: coords[1] + ',' + coords[0], icon: '📍', dist });
    }
  });
  items.sort((a, b) => a.dist - b.dist);
  renderSuggest(items.slice(0, 8));
}, 300);

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  // 精确匹配厕所名称
  const hit = MOCK_TOILETS.find(t => t.name.includes(q) || t.name.toLowerCase().includes(q.toLowerCase()));
  if (hit) {
    setSearchCenter([hit.lat, hit.lng], hit.name, 16);
    openPanel(hit);
    showToast('已定位到：' + hit.name);
    return;
  }
  // 匹配预设地点
  for (const [key, coords] of Object.entries(PRESET_LOCATIONS)) {
    if (q.includes(key)) {
      setSearchCenter(coords, key, 15);
      showToast('已定位到：' + key + '，周边厕所已更新');
      return;
    }
  }
  // 本地模糊搜索：显示建议列表
  const items = [];
  MOCK_TOILETS.forEach(t => {
    if (t.name.includes(q) || (t.address && t.address.includes(q))) {
      items.push({ name: t.name, addr: t.address || '公共厕所', location: t.lng + ',' + t.lat, icon: '🚾', address: t.address || '' });
    }
  });
  Object.entries(PRESET_LOCATIONS).forEach(([key, coords]) => {
    if (q.includes(key) || key.includes(q)) {
      items.push({ name: key, addr: '地点', location: coords[1] + ',' + coords[0], icon: '📍', address: '' });
    }
  });
  if (items.length > 0) {
    items.sort((a, b) => {
      const [aLng, aLat] = a.location.split(',').map(Number);
      const [bLng, bLat] = b.location.split(',').map(Number);
      return haversine(searchCenter[0], searchCenter[1], aLat, aLng) - haversine(searchCenter[0], searchCenter[1], bLat, bLng);
    });
    if (items.length === 1) {
      selectSuggest(items[0]);
    } else {
      renderSuggest(items.slice(0, 8));
    }
  } else {
    showToast('未找到地点，换个关键词试试');
  }
}

/* ============ 事件绑定 ============ */
/* Bottom Sheet 拖拽交互：支持上拉展开、下拉收起，替换展开/收起按钮 */
(function initSheetDrag() {
  const list = document.getElementById('nearbyList');
  const header = document.getElementById('nearbyHeader');
  let startY = 0;             // 拖拽起点 Y 坐标
  let startHeight = 0;        // 拖拽起点时列表高度
  let startTime = 0;          // 拖拽起点时间戳（ms），用于无 move 事件的快速 flick 速度计算
  let isDragging = false;     // 是否处于拖拽中（已通过阈值确认）
  let pendingDrag = false;    // 触摸已开始但未达拖拽阈值（等待确认是拖拽还是点击）
  let moved = false;          // 是否发生过有效移动（用于抑制拖拽后合成的 click 误触）
  // 速度采样：用于快速 fling 时的 snap 判定，避免仅按位置 snap 导致快速滑动收不拢/展不开
  let lastY = 0;              // 上一次 move 采样的 Y 坐标
  let lastTime = 0;           // 上一次 move 采样的时间戳（ms）
  let velocity = 0;           // 最近一次 move 的瞬时速度（px/ms，正值=手指上移=展开方向）
  const HEADER_H = 56;
  const COLLAPSED_H_DESKTOP = 48;
  const DRAG_THRESHOLD = 6;   // 拖拽激活阈值（px）：超过该位移才认定为拖拽，避免和点击冲突
  // 速度阈值（px/ms）：超过该值视为快速 fling，按方向 snap 而非按位置 snap
  const FLING_VELOCITY = 0.7;
  // move 采样有效性窗口（ms）：超过该时长认为速度已过期（事件丢失时避免用陈旧速度误判 snap）
  const VELOCITY_FRESH_MS = 100;
  // 顶部安全间距：列表顶部与搜索栏底部之间的最小间距（px），防止穿模
  const TOP_GAP = 8;
  // 当前 snap 状态：'collapsed' | 'half' | 'expanded'
  let _snapState = 'collapsed';

  function isDesktop() {
    return window.innerWidth >= 768;
  }
  function getSafeBottom() {
    if (isDesktop()) return 0;
    const val = getComputedStyle(document.documentElement).getPropertyValue('--safe-bottom').trim();
    return parseFloat(val) || 0;
  }
  function getSafeTop() {
    if (isDesktop()) return 0;
    const val = getComputedStyle(document.documentElement).getPropertyValue('--safe-top').trim();
    return parseFloat(val) || 0;
  }
  /* 收起高度：只显示 header（56px + safe-bottom） */
  function getCollapsedH() {
    return (isDesktop() ? COLLAPSED_H_DESKTOP : HEADER_H) + getSafeBottom();
  }
  /* 预览高度：35vh（两条半卡片预览，保留 65% 地图可见） */
  function getHalfH() {
    if (isDesktop()) return Math.floor(window.innerHeight * 0.5);
    return Math.floor(window.innerHeight * 0.35);
  }
  /* 全展开高度：到搜索栏底部下方 TOP_GAP 处，不穿模盖住 topbar */
  function getFullH() {
    if (isDesktop()) return Math.floor(window.innerHeight * 0.5);
    // 动态计算 topbar 底部 Y 坐标：标题行 + 搜索栏 + padding
    const topbar = document.querySelector('.topbar');
    if (topbar) {
      const topbarBottom = topbar.getBoundingClientRect().bottom;
      const maxH = window.innerHeight - topbarBottom - TOP_GAP;
      return Math.max(getHalfH() + 40, Math.floor(maxH));
    }
    // 兜底：safe-top + 标题行(~50px) + 搜索栏(44px) + padding(~12px) + TOP_GAP
    const fallback = getSafeTop() + 50 + 44 + 12 + TOP_GAP;
    return window.innerHeight - fallback;
  }
  function getCurrentH() {
    return list.getBoundingClientRect().height;
  }
  function setHeight(px) {
    list.style.maxHeight = px + 'px';
  }
  /* 根据当前高度判断所处的 snap 状态 */
  function getSnapFromHeight(h) {
    const ch = getCollapsedH();
    const hh = getHalfH();
    const fh = getFullH();
    if (h <= (ch + hh) / 2) return 'collapsed';
    if (h <= (hh + fh) / 2) return 'half';
    return 'expanded';
  }
  function applySnapClass(snap) {
    list.classList.remove('is-collapsed');
    if (snap === 'collapsed') {
      list.classList.add('is-collapsed');
    }
  }
  function onStart(y) {
    // 只记录起点状态，不立即进入拖拽模式；等位移超阈值才激活（避免干扰点击）
    pendingDrag = true;
    isDragging = false;
    moved = false;
    startY = y;
    startHeight = getCurrentH();
    // 记录起始 snap 状态
    _snapState = getSnapFromHeight(startHeight);
    const now = performance.now();
    startTime = now;
    // 重置速度采样
    lastY = y;
    lastTime = now;
    velocity = 0;
  }
  /* 激活拖拽：位移超阈值后调用，添加视觉状态（禁止 transition、固定高度） */
  function activateDrag() {
    if (isDragging) return;
    isDragging = true;
    pendingDrag = false;
    moved = true;
    list.classList.add('is-dragging');
    list.classList.remove('is-collapsed');
    document.body.classList.add('is-dragging-sheet');
    setHeight(startHeight);
  }
  function onMove(y) {
    if (!pendingDrag && !isDragging) return;
    const dy = startY - y;
    // 计算瞬时速度
    const now = performance.now();
    const dt = now - lastTime;
    if (dt > 0) velocity = (lastY - y) / dt;
    lastY = y;
    lastTime = now;
    // 未激活拖拽时：判断是否超过拖拽阈值；快速 fling 也直接激活
    if (!isDragging) {
      if (Math.abs(dy) < DRAG_THRESHOLD && Math.abs(velocity) <= FLING_VELOCITY) return;
      activateDrag();
    }
    const minH = getCollapsedH();
    const maxH = getFullH();  // 拖拽上限：不超过 topbar 底部，防止穿模
    // 拖拽高度限制在 [minH, maxH] 之间，手指可以自由拉到任意合法高度
    const newH = Math.min(maxH, Math.max(minH, startHeight + dy));
    setHeight(newH);
    // 拖拽过程中只同步 nav-bar 位置（CSS 变量，轻量），不平移地图避免干扰 touch 事件
    if (window.updateNavBarPosition) window.updateNavBarPosition();
  }
  function onEnd(e) {
    if (!pendingDrag && !isDragging) return;
    const wasDragging = isDragging;
    const wasPending = pendingDrag && !isDragging;
    isDragging = false;
    pendingDrag = false;

    let endY = lastY;
    let endVelocity = velocity;
    if (wasPending && e) {
      const point = e.changedTouches ? e.changedTouches[0] : e;
      if (point && typeof point.clientY === 'number') {
        endY = point.clientY;
        const totalDy = startY - endY;
        const totalDt = performance.now() - startTime;
        if (totalDt > 0) endVelocity = totalDy / totalDt;
        moved = Math.abs(totalDy) > 3;
      }
    }

    const ch = getCollapsedH();
    const hh = getHalfH();
    const fh = getFullH();

    const flingFresh = (performance.now() - lastTime) < VELOCITY_FRESH_MS || wasPending;
    let targetSnap;

    if (flingFresh && endVelocity > FLING_VELOCITY) {
      // 快速上滑：升一档（collapsed→half→expanded）
      targetSnap = _snapState === 'collapsed' ? 'half' : 'expanded';
    } else if (flingFresh && endVelocity < -FLING_VELOCITY) {
      // 快速下滑：降一档（expanded→half→collapsed）
      targetSnap = _snapState === 'expanded' ? 'half' : 'collapsed';
    } else if (wasDragging) {
      // 慢速拖拽：按最终位置判定 snap
      const h = getCurrentH();
      targetSnap = getSnapFromHeight(h);
    } else {
      // 普通点击（非快速 flick 且非拖拽）：直接返回，由 click 事件处理 toggle
      moved = false;
      return;
    }

    // 执行过渡动画到目标 snap 高度
    list.classList.remove('is-dragging');
    if (wasPending) {
      moved = true; // 快速 flick 抑制后续合成 click 事件
    }

    const targetH = targetSnap === 'collapsed' ? ch : targetSnap === 'half' ? hh : fh;
    _snapState = targetSnap;

    // 用内联样式锁定当前高度作为 transition 起点，然后设目标高度触发过渡
    const startH = getCurrentH();
    list.style.overflow = 'hidden';
    list.style.maxHeight = startH + 'px';
    void list.offsetHeight; // 强制 reflow 确保浏览器记录起始高度
    applySnapClass(targetSnap);
    list.style.maxHeight = targetH + 'px';

    // 过渡结束后清理内联样式（overflow 恢复，但 maxHeight 保留给非collapsed状态防止CSS截断）
    const cleanupAndSync = () => {
      list.style.overflow = '';
      if (targetSnap === 'collapsed') {
        list.style.maxHeight = '';
      }
      // half/expanded 保留内联 maxHeight，因为 CSS 默认 max-height 是 90vh 兜底，
      // 而 getFullH() 是动态计算的（基于 topbar 位置），需要内联精确控制
    };
    const onTransEnd = (ev) => {
      if (ev.target === list && ev.propertyName === 'max-height') {
        list.removeEventListener('transitionend', onTransEnd);
        cleanupAndSync();
      }
    };
    list.addEventListener('transitionend', onTransEnd);
    setTimeout(cleanupAndSync, 380);

    // snap 过渡期间用 rAF 循环同步 nav-bar 位置，结束后平移地图
    if (window.syncNavBarDuringTransition) {
      window.syncNavBarDuringTransition(400);
    }
  }

  /* 点击 header 时的 toggle 行为：
     collapsed → half（预览两条半）；half/expanded → collapsed */
  window._toggleNearbySheet = function() {
    if (_snapState === 'collapsed') {
      _snapState = 'half';
      const hh = getHalfH();
      list.style.overflow = 'hidden';
      list.style.maxHeight = getCollapsedH() + 'px';
      void list.offsetHeight;
      list.classList.remove('is-collapsed');
      list.style.maxHeight = hh + 'px';
      setTimeout(() => { list.style.overflow = ''; }, 380);
      if (window.syncNavBarDuringTransition) window.syncNavBarDuringTransition(400);
    } else {
      _snapState = 'collapsed';
      const ch = getCollapsedH();
      const startH = getCurrentH();
      list.style.overflow = 'hidden';
      list.style.maxHeight = startH + 'px';
      void list.offsetHeight;
      list.classList.add('is-collapsed');
      list.style.maxHeight = ch + 'px';
      setTimeout(() => { list.style.maxHeight = ''; list.style.overflow = ''; }, 380);
      if (window.syncNavBarDuringTransition) window.syncNavBarDuringTransition(400);
    }
  };

  /* 触摸事件：header 上 touchstart 启动拖拽；
     list 内容区设了 touch-action: pan-y，浏览器原生处理垂直滚动，不启动拖拽。
     touchmove/touchend 绑定到 document 确保手指滑出 header 后事件不丢失 */
  header.addEventListener('touchstart', (e) => {
    onStart(e.touches[0].clientY);
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (!pendingDrag && !isDragging) return;
    onMove(e.touches[0].clientY);
    if (isDragging) e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchend', (e) => onEnd(e));
  document.addEventListener('touchcancel', (e) => onEnd(e));

  header.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    onStart(e.clientY);
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!pendingDrag && !isDragging) return;
    onMove(e.clientY);
  });
  document.addEventListener('mouseup', (e) => onEnd(e));

  header.addEventListener('click', (e) => {
    if (moved) { e.preventDefault(); e.stopPropagation(); moved = false; return; }
    if (window._toggleNearbySheet) {
      window._toggleNearbySheet();
    } else {
      toggleNearbyList();
    }
  });
})();

/* 防拖动误触：Leaflet 在拖动地图后有时仍会触发 click，用 dragstart/dragend 标记 */
let _mapDragged = false;
map.on('dragstart', () => { _mapDragged = true; });
map.on('dragend', () => { setTimeout(() => { _mapDragged = false; }, 10); });

/* ============ 移动端长按地图触发周边搜索（避免短按误触） ============ */
/* 移动端地图产品标准选点手势：高德/百度/Google Maps 都用长按选点
   短按只关闭浮层，长按才以坐标为中心搜索周边厕所
   桌面端保持点击触发搜索 */
const _isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let _mapLongPressTimer = null;
let _mapLongPressTriggered = false; // 长按触发后抑制合成 click
let _mapLongPressStart = null;      // { point, latlng }

if (_isTouchDevice) {
  const container = map.getContainer();
  const MAP_LP_MS = 500;   // 长按阈值
  const MAP_LP_MOVE = 10;  // 移动容差（超过则视为拖动，取消长按）

  container.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    if (pickPinMarker) return; // 拾取模式下由 startPickMode 处理
    const t = e.touches[0];
    const rect = container.getBoundingClientRect();
    const cp = L.point(t.clientX - rect.left, t.clientY - rect.top);
    _mapLongPressStart = { point: cp, latlng: map.containerPointToLatLng(cp) };
    _mapLongPressTriggered = false;
    if (_mapLongPressTimer) clearTimeout(_mapLongPressTimer);
    _mapLongPressTimer = setTimeout(() => {
      _mapLongPressTriggered = true;
      _mapLongPressTimer = null;
      if (navigator.vibrate) navigator.vibrate(30);
      // 长按触发：关闭浮层 + 以长按坐标搜索周边厕所
      closePanel();
      collapseNearbyList();
      document.getElementById('searchSuggest').classList.remove('is-show');
      document.getElementById('filterDropdown').classList.remove('is-show');
      document.getElementById('filterBtn').classList.remove('is-active');
      setSearchCenter([_mapLongPressStart.latlng.lat, _mapLongPressStart.latlng.lng], '长按位置', Math.max(map.getZoom(), 15));
    }, MAP_LP_MS);
  }, { passive: true });

  container.addEventListener('touchmove', (e) => {
    if (!_mapLongPressStart || e.touches.length !== 1) return;
    const t = e.touches[0];
    const rect = container.getBoundingClientRect();
    const dx = (t.clientX - rect.left) - _mapLongPressStart.point.x;
    const dy = (t.clientY - rect.top) - _mapLongPressStart.point.y;
    if (Math.sqrt(dx * dx + dy * dy) > MAP_LP_MOVE) {
      if (_mapLongPressTimer) { clearTimeout(_mapLongPressTimer); _mapLongPressTimer = null; }
      _mapLongPressStart = null;
    }
  }, { passive: true });

  const _clearMapLongPress = () => {
    if (_mapLongPressTimer) { clearTimeout(_mapLongPressTimer); _mapLongPressTimer = null; }
    _mapLongPressStart = null;
  };
  container.addEventListener('touchend', _clearMapLongPress);
  container.addEventListener('touchcancel', _clearMapLongPress);
}

map.on('click', (e) => {
  if (_mapDragged) { _mapDragged = false; return; }
  if (pickPinMarker) return;
  // 移动端：长按已触发搜索，跳过 Leaflet 合成的 click（防止重复触发）
  if (_isTouchDevice && _mapLongPressTriggered) {
    _mapLongPressTriggered = false;
    return;
  }
  /* 点击 marker / cluster 时不触发空白区域逻辑（marker 自己有 click handler） */
  const target = e.originalEvent && e.originalEvent.target;
  if (target && target.closest && (target.closest('.leaflet-marker-icon') || target.closest('.leaflet-marker-shadow') || target.closest('.marker-cluster') || target.closest('.toilet-cluster-icon') || target.closest('.leaflet-interactive'))) return;

  const panel = document.getElementById('panel');
  const list = document.getElementById('nearbyList');
  const searchSuggest = document.getElementById('searchSuggest');
  const filterDropdown = document.getElementById('filterDropdown');
  const filterBtn = document.getElementById('filterBtn');

  const hasOverlay = panel.classList.contains('is-show')
    || !list.classList.contains('is-collapsed')
    || searchSuggest.classList.contains('is-show')
    || filterDropdown.classList.contains('is-show');

  if (hasOverlay) {
    closePanel();
    collapseNearbyList();
    searchSuggest.classList.remove('is-show');
    filterDropdown.classList.remove('is-show');
    filterBtn.classList.remove('is-active');
    document.getElementById('searchInput').blur();
  } else if (!_isTouchDevice) {
    // 桌面端：无浮层时点击触发周边搜索
    // 移动端：无浮层时短按不触发搜索（需长按）
    closePanel();
    setSearchCenter([e.latlng.lat, e.latlng.lng], '点击位置', Math.max(map.getZoom(), 15));
  }
});
/* 缩放结束时重渲染（切换聚合/直显模式） */
map.on('zoomend', renderMarkers);

/* ============ Panel Drag Handle（MD3 Bottom Sheet / Side Sheet 拖拽） ============ */
(function initPanelDrag() {
  const panel = document.getElementById('panel');
  const handle = panel.querySelector('.panel__handle');
  const panelBody = panel.querySelector('.panel__body');
  let _dragging = false;
  let _startX = 0, _startY = 0;
  let _currentX = 0, _currentY = 0;
  let _velocity = 0;
  let _lastX = 0, _lastY = 0, _lastTime = 0;
  let _isDesktop = false;
  let _currentSnap = 'closed';
  let _dragFromHandle = false;
  let _directionLocked = false;
  const TAP_THRESHOLD = 5;
  const SNAP_THRESHOLD = 100;
  const VELOCITY_THRESHOLD = 0.5;

  function isDesktop() {
    return window.innerWidth >= 768;
  }

  function setSnap(snap, animate = true) {
    const prevSnap = _currentSnap;
    _currentSnap = snap;

    panel.classList.remove('is-half', 'is-expanded', 'is-compact');

    if (snap === 'closed') {
      panel.classList.remove('is-show');
      panel.style.transform = '';
      panel.style.transition = '';
      currentToilet = null;
      clearPickMode();
      document.getElementById('nearbyList').style.display = '';
    } else {
      panel.classList.add('is-show');
      if (snap === 'compact') {
        panel.classList.add('is-compact');
      } else if (snap === 'half') {
        panel.classList.add('is-half');
      } else if (snap === 'expanded') {
        panel.classList.add('is-expanded');
      }
      panel.style.transform = 'translateY(0)';
      if (animate) {
        panel.style.transition = '';
      }
    }

    if (snap !== 'closed' && prevSnap !== snap) {
      // nav-bar 位置同步：用 rAF 循环在过渡期间持续更新，避免慢半拍
      if (animate && window.syncNavBarDuringTransition) {
        window.syncNavBarDuringTransition(400);
      }
      // 面板高度变化后平移 POI 到可见区域（panelHeightChanged 内部也会调 updateNavBarPosition，作为最终兜底）
      if (typeof window.panelHeightChanged === 'function') {
        setTimeout(() => window.panelHeightChanged(), 280);
      }
    }
  }

  function onStart(e) {
    _isDesktop = isDesktop();
    if (_isDesktop) {
      if (!panel.classList.contains('is-show')) return;
      if (!e.target.closest('.panel__handle')) return;
    } else {
      if (_currentSnap === 'closed') return;
    }

    _dragFromHandle = !!e.target.closest('.panel__handle');

    if (!_isDesktop && !_dragFromHandle) {
      if (_currentSnap === 'closed') return;
      if (panelBody.scrollTop > 0) return;
    }

    _dragging = true;
    _directionLocked = false;
    const point = e.touches ? e.touches[0] : e;
    _startX = point.clientX;
    _startY = point.clientY;
    _currentX = 0;
    _currentY = 0;
    _lastX = _startX;
    _lastY = _startY;
    _lastTime = Date.now();
    _velocity = 0;

    panel.style.transition = 'none';
    panel.classList.add('is-dragging');
    document.body.classList.add('is-dragging-sheet'); // 禁用 nav-bar bottom 过渡，确保跟手
    document.body.style.userSelect = 'none';
  }

  function onMove(e) {
    if (!_dragging) return;
    const point = e.touches ? e.touches[0] : e;
    const dx = point.clientX - _startX;
    const dy = point.clientY - _startY;
    const now = Date.now();
    const dt = now - _lastTime;

    if (!_isDesktop && !_dragFromHandle && !_directionLocked) {
      if (Math.abs(dy) < 8 && Math.abs(dx) < 8) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        _dragging = false;
        panel.classList.remove('is-dragging');
        document.body.style.userSelect = '';
        return;
      }
      _directionLocked = true;
    }

    if (_isDesktop) {
      _currentX = dx < 0 ? dx * 0.3 : dx;
      _currentY = 0;
      if (dt > 0) _velocity = (point.clientX - _lastX) / dt;
      panel.style.transform = `translateX(${_currentX}px)`;
    } else {
      if (!_dragFromHandle) {
        if (_currentSnap === 'expanded' && dy < 0) {
          _dragging = false;
          panel.classList.remove('is-dragging');
          document.body.style.userSelect = '';
          return;
        }
      }

      let offsetY = dy;
      if (_currentSnap === 'compact') {
        if (dy < 0) {
          offsetY = dy * 0.5;  /* compact→half 上滑阻尼 */
        }
      } else if (_currentSnap === 'half') {
        if (dy < 0) {
          offsetY = dy * 0.5;
        }
      } else if (_currentSnap === 'expanded') {
        if (dy < 0) {
          offsetY = dy * 0.3;
        }
      }
      _currentX = 0;
      _currentY = offsetY;
      if (dt > 0) _velocity = (point.clientY - _lastY) / dt;
      panel.style.transform = `translateY(${_currentY}px)`;
      // 拖拽过程中只同步 nav-bar 位置，不平移地图避免干扰 touch 事件
      if (window.updateNavBarPosition) window.updateNavBarPosition();
    }

    _lastX = point.clientX;
    _lastY = point.clientY;
    _lastTime = now;
    e.preventDefault();
  }

  function onEnd() {
    if (!_dragging) return;
    _dragging = false;
    panel.classList.remove('is-dragging');
    document.body.classList.remove('is-dragging-sheet'); // 恢复 nav-bar bottom 过渡
    document.body.style.userSelect = '';

    const totalDist = _isDesktop ? _currentX : _currentY;
    const moved = Math.abs(totalDist) > TAP_THRESHOLD;

    if (_isDesktop) {
      const panelSize = panel.offsetWidth;
      const threshold = Math.min(panelSize * 0.3, 200);
      const fastFling = _velocity > 0.5;

      if (totalDist > threshold || fastFling) {
        panel.style.transition = 'transform var(--md-dur-medium) var(--md-easing-emphasized)';
        panel.style.transform = 'translateX(120%)';
        const onTransEnd = () => {
          panel.removeEventListener('transitionend', onTransEnd);
          panel.classList.remove('is-show');
          panel.style.transform = '';
          panel.style.transition = '';
          currentToilet = null;
          clearPickMode();
          document.getElementById('nearbyList').style.display = '';
        };
        panel.addEventListener('transitionend', onTransEnd);
        setTimeout(onTransEnd, 350);
      } else {
        panel.style.transition = '';
        panel.style.transform = '';
      }
      return;
    }

    if (!moved) {
      if (_dragFromHandle) {
        if (_currentSnap === 'compact') {
          setSnap('half');
        } else if (_currentSnap === 'half') {
          setSnap('expanded');
        } else if (_currentSnap === 'expanded') {
          setSnap('half');
        }
      }
      return;
    }

    let targetSnap = _currentSnap;
    const fastUp = _velocity < -VELOCITY_THRESHOLD;
    const fastDown = _velocity > VELOCITY_THRESHOLD;

    if (_currentSnap === 'compact') {
      if (totalDist < -SNAP_THRESHOLD || fastUp) {
        targetSnap = 'half';
      } else if (totalDist > SNAP_THRESHOLD || fastDown) {
        targetSnap = 'closed';
      }
    } else if (_currentSnap === 'half') {
      if (totalDist < -SNAP_THRESHOLD || fastUp) {
        targetSnap = 'expanded';
      } else if (totalDist > SNAP_THRESHOLD || fastDown) {
        targetSnap = 'closed';
      }
    } else if (_currentSnap === 'expanded') {
      if (totalDist > SNAP_THRESHOLD || fastDown) {
        targetSnap = 'half';
      }
    }

    setSnap(targetSnap);
  }

  window._setPanelSnap = setSnap;
  window._closePanelMobile = function() {
    setSnap('closed');
  };

  panel.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('touchmove', (e) => { if (_dragging) onMove(e); }, { passive: false });
  document.addEventListener('touchend', onEnd);
  document.addEventListener('touchcancel', onEnd);

  handle.addEventListener('mousedown', onStart);
  document.addEventListener('mousemove', (e) => { if (_dragging) onMove(e); });
  document.addEventListener('mouseup', onEnd);
})();

// 筛选下拉：点击漏斗按钮 toggle 显示/隐藏
document.getElementById('filterBtn').addEventListener('click', (e) => {

document.getElementById('searchInput').addEventListener('input', onSearchInput);
document.getElementById('searchInput').addEventListener('focus', () => {

// 搜索清除按钮：输入时显示，点击清空
const searchClear = document.getElementById('searchClear');

document.addEventListener('click', e => {

});

/* ============ 启动 ============ */

window._hasGpsFix = true;
// 以海港公园为中心拉取周边厕所（silent=true：初始加载不自动展开列表）
