<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="厕哪" />
  <title>厕哪 — 找公厕的说是</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.css"
  />
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
/* {{STYLES}} */
  </style>
</head>
<body>
  <div id="app">

    <!-- ======== TopBar：标题行 + 搜索行 ======== -->
    <header class="topbar" role="banner">
      <div class="topbar__title-row">
        <div class="topbar__brand">
          <span class="topbar__brand-sub">找公厕</span>
          <h1 class="topbar__brand-title">厕哪</h1>
        </div>
        <button class="topbar__add" id="addBtn" aria-label="上报新厕所">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="search-wrap">
        <svg class="search-wrap__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input
          id="searchInput"
          class="search-wrap__input"
          type="text"
          placeholder="搜索滨海新区地点"
          autocomplete="off"
          aria-label="搜索地点"
        />
        <button class="search-wrap__clear" id="searchClear" title="清除" aria-label="清除搜索内容">×</button>
        <div class="search-suggest" id="searchSuggest" role="listbox"></div>
      </div>
    </header>

    <!-- ======== Filter 浮动筛选按钮（地图左上角，原 Zoom 位置） ======== -->
    <div class="filter-fab" id="filterFab">
      <button class="filter-fab__btn" id="filterBtn" title="筛选" aria-label="筛选厕所类型" aria-haspopup="listbox">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <span class="filter-fab__label" id="filterLabel">全部</span>
      </button>
      <div class="filter-dropdown" id="filterDropdown" role="listbox" aria-label="厕所筛选">
        <div class="filter-dropdown__item is-active" data-filter="all" role="option">
          <span class="filter-dropdown__check">✓</span><span class="filter-dropdown__label">全部</span>
        </div>
        <div class="filter-dropdown__item" data-filter="accessible" role="option"><span class="filter-dropdown__check">✓</span><span class="filter-dropdown__dot" style="background:var(--c-accessible)"></span><span class="filter-dropdown__label">无障碍</span></div>
        <div class="filter-dropdown__item" data-filter="family" role="option"><span class="filter-dropdown__check">✓</span><span class="filter-dropdown__dot" style="background:var(--c-family)"></span><span class="filter-dropdown__label">第三卫生间</span></div>
        <div class="filter-dropdown__item" data-filter="water" role="option"><span class="filter-dropdown__check">✓</span><span class="filter-dropdown__dot" style="background:var(--c-water)"></span><span class="filter-dropdown__label">房车水源</span></div>
        <div class="filter-dropdown__item" data-filter="open" role="option"><span class="filter-dropdown__check">✓</span><span class="filter-dropdown__dot" style="background:var(--c-ok)"></span><span class="filter-dropdown__label">仅看开放</span></div>
      </div>
    </div>

    <!-- ======== Map：地图容器 ======== -->
    <main id="map" role="application" aria-label="厕所地图"></main>

    <!-- ======== NearbyList：周边推荐列表 ======== -->
    <aside class="nearby-list is-collapsed" id="nearbyList" aria-label="周边厕所列表">
      <div class="nearby-list__header" id="nearbyHeader">
        <div class="nearby-list__drag-handle" id="nearbyDragHandle"></div>
        <span class="nearby-list__label"><b id="nearbyTitle">周边厕所</b><span class="nearby-list__sub"> · 按距离推荐</span></span>
      </div>
      <div class="nearby-list__items" id="nearbyItems"></div>
    </aside>

    <!-- ======== 底部悬浮胶囊操作条（定位 + 地铁图层 + 图例） ======== -->
    <div class="nav-bar" id="navBar">
      <button class="nav-bar__btn" id="relocBtn" aria-label="定位到海港公园">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3m10-10h-3M5 12H2"/></svg>
      </button>
      <button class="nav-bar__btn nav-bar__btn--metro" id="navMetroBtn" aria-label="轨道交通图层">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="16" height="18" rx="2"/>
          <line x1="8" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="16" y2="21"/>
          <line x1="4" y1="10" x2="8" y2="10"/><line x1="16" y1="10" x2="20" y2="10"/>
        </svg>
      </button>
      <button class="nav-bar__btn nav-bar__btn--legend" id="navLegendBtn" aria-label="颜色图例">
        <span class="legend-dots">
          <span class="legend-dots__dot" style="background:var(--c-ok)"></span>
          <span class="legend-dots__dot" style="background:var(--c-fail)"></span>
          <span class="legend-dots__dot" style="background:var(--c-stale)"></span>
        </span>
      </button>
    </div>

    <!-- ======== Legend 弹出（点击图例按钮展开） ======== -->
    <div class="legend-popup" id="legendPopup" aria-label="颜色图例">
      <div class="legend-popup__arrow"></div>
      <div class="legend-popup__body">
        <div class="legend-popup__row"><span class="legend-popup__dot" style="background:var(--c-ok)"></span>能用</div>
        <div class="legend-popup__row"><span class="legend-popup__dot" style="background:var(--c-fail)"></span>不能用</div>
        <div class="legend-popup__row"><span class="legend-popup__dot" style="background:var(--c-uncertain)"></span>不确定</div>
        <div class="legend-popup__row"><span class="legend-popup__dot" style="background:var(--c-stale)"></span>信息待复核</div>
      </div>
    </div>

    <!-- ======== Panel：详情面板 ======== -->
    <section class="panel" id="panel" aria-label="厕所详情">
      <div class="panel__handle"></div>
      <div class="panel__body" id="panelBody"></div>
    </section>

  </div>

  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script>
/* {{SCRIPTS}} */
  </script>
</body>
</html>
